name: Issue Agent Pipeline (Local Codex)

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

concurrency:
  group: issue-agent-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  engineer:
    name: Engineer Agent
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      engineer_message: ${{ steps.capture_engineer_output.outputs.message }}
      engineer_conclusion: ${{ steps.engineer_run.outcome }}
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
      pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
      issue_number: ${{ steps.issue_context.outputs.issue_number }}
      issue_title: ${{ steps.issue_context.outputs.issue_title }}
      issue_body: ${{ steps.issue_context.outputs.issue_body }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve issue context
        id: issue_context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber = Number(`${{ github.event.issue.number || inputs.issue_number }}`);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            core.setOutput("issue_number", String(issue.number));
            core.setOutput("issue_title", issue.title || "");
            core.setOutput("issue_body", issue.body || "");

      - name: Verify Codex CLI is installed
        run: |
          set -euo pipefail
          codex --version

      - name: Run Engineer agent locally with Codex CLI
        id: engineer_run
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ steps.issue_context.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue_context.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.issue_context.outputs.issue_body }}
        run: |
          set -euo pipefail
          cat .github/agents/engineer.md > /tmp/engineer-prompt.md
          cat <<EOF >> /tmp/engineer-prompt.md

          Issue context:
          Issue #${ISSUE_NUMBER}
          Title: ${ISSUE_TITLE}
          Body:
          ${ISSUE_BODY}
          EOF

          bash .github/scripts/run_codex_agent.sh /tmp/engineer-prompt.md engineer-output.md

      - name: Capture engineer output
        id: capture_engineer_output
        if: always()
        run: |
          set -euo pipefail
          if [[ -f engineer-output.md ]]; then
            {
              echo 'message<<EOF'
              cat engineer-output.md
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'message<<EOF'
              echo 'No engineer output produced. Check self-hosted runner logs and local Codex authentication.'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request from engineer changes
        id: create_pr
        if: steps.engineer_run.outcome == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: address issue #${{ steps.issue_context.outputs.issue_number }}"
          branch: "codex/issue-${{ steps.issue_context.outputs.issue_number }}"
          title: "Resolve issue #${{ steps.issue_context.outputs.issue_number }}: ${{ steps.issue_context.outputs.issue_title }}"
          body: |
            Automated implementation by local Engineer agent for #${{ steps.issue_context.outputs.issue_number }}.

            ### Engineer output
            ${{ steps.capture_engineer_output.outputs.message }}
          labels: automated,codex,local-runner
          add-paths: |
            **

      - name: Comment engineer result on issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber = Number(`${{ steps.issue_context.outputs.issue_number }}`);
            const prUrl = `${{ steps.create_pr.outputs.pull-request-url }}`;
            const finalMessage = `${{ steps.capture_engineer_output.outputs.message }}`;
            const engineerOutcome = `${{ steps.engineer_run.outcome }}`;

            const statusLine =
              engineerOutcome === "success"
                ? "Status: ✅ Engineer run succeeded on local runner."
                : `Status: ❌ Engineer run failed (${engineerOutcome}).`;

            const prLine =
              engineerOutcome === "success"
                ? (prUrl ? `PR created: ${prUrl}` : "No PR created (no file changes detected).")
                : "No PR created because the engineer run failed.";

            const body = [
              "## Engineer agent complete",
              statusLine,
              prLine,
              "",
              "### Engineer summary",
              finalMessage || "No summary produced. Check workflow logs for details."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

  qa:
    name: QA Agent
    runs-on: self-hosted
    needs: engineer
    if: needs.engineer.outputs.engineer_conclusion == 'success' && needs.engineer.outputs.pr_number != ''
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      qa_message: ${{ steps.capture_qa_output.outputs.message }}
    steps:
      - uses: actions/checkout@v5

      - name: Verify Codex CLI is installed
        run: |
          set -euo pipefail
          codex --version

      - name: Run QA agent locally with Codex CLI
        id: qa_run
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ needs.engineer.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.engineer.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.engineer.outputs.issue_body }}
          PR_NUMBER: ${{ needs.engineer.outputs.pr_number }}
          PR_URL: ${{ needs.engineer.outputs.pr_url }}
        run: |
          set -euo pipefail
          cat .github/agents/qa.md > /tmp/qa-prompt.md
          cat <<EOF >> /tmp/qa-prompt.md

          Issue context:
          Issue #${ISSUE_NUMBER}
          Title: ${ISSUE_TITLE}
          Body:
          ${ISSUE_BODY}

          Pull request number: ${PR_NUMBER}
          Pull request URL: ${PR_URL}
          EOF

          bash .github/scripts/run_codex_agent.sh /tmp/qa-prompt.md qa-output.md --read-only

      - name: Capture QA output
        id: capture_qa_output
        if: always()
        run: |
          set -euo pipefail
          if [[ -f qa-output.md ]]; then
            {
              echo 'message<<EOF'
              cat qa-output.md
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'message<<EOF'
              echo 'No QA output produced. Check self-hosted runner logs and local Codex authentication.'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post QA review
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const qa = `${{ steps.capture_qa_output.outputs.message }}`;
            const issueNumber = Number(`${{ needs.engineer.outputs.issue_number }}`);
            const prNumberRaw = `${{ needs.engineer.outputs.pr_number }}`;
            const prNumber = Number(prNumberRaw);

            const issueBody = [
              "## QA agent complete",
              "",
              qa || "No QA output produced."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: issueBody,
            });

            if (Number.isFinite(prNumber) && prNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: issueBody,
              });
            }

  pm:
    name: PM Agent
    runs-on: self-hosted
    needs: [engineer, qa]
    if: needs.engineer.outputs.engineer_conclusion == 'success' && needs.engineer.outputs.pr_number != ''
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Verify Codex CLI is installed
        run: |
          set -euo pipefail
          codex --version

      - name: Run PM agent locally with Codex CLI
        id: pm_run
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ needs.engineer.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.engineer.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.engineer.outputs.issue_body }}
          PR_NUMBER: ${{ needs.engineer.outputs.pr_number }}
          PR_URL: ${{ needs.engineer.outputs.pr_url }}
          ENGINEER_SUMMARY: ${{ needs.engineer.outputs.engineer_message }}
          QA_SUMMARY: ${{ needs.qa.outputs.qa_message }}
        run: |
          set -euo pipefail
          cat .github/agents/pm.md > /tmp/pm-prompt.md
          cat <<EOF >> /tmp/pm-prompt.md

          Issue context:
          Issue #${ISSUE_NUMBER}
          Title: ${ISSUE_TITLE}
          Body:
          ${ISSUE_BODY}

          Pull request number: ${PR_NUMBER}
          Pull request URL: ${PR_URL}

          Engineer summary:
          ${ENGINEER_SUMMARY}

          QA summary:
          ${QA_SUMMARY}
          EOF

          bash .github/scripts/run_codex_agent.sh /tmp/pm-prompt.md pm-output.md --read-only

      - name: Capture PM output
        id: capture_pm_output
        if: always()
        run: |
          set -euo pipefail
          if [[ -f pm-output.md ]]; then
            {
              echo 'message<<EOF'
              cat pm-output.md
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'message<<EOF'
              echo 'No PM output produced. Check self-hosted runner logs and local Codex authentication.'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post PM summary to issue and PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pm = `${{ steps.capture_pm_output.outputs.message }}`;
            const issueNumber = Number(`${{ needs.engineer.outputs.issue_number }}`);
            const prNumberRaw = `${{ needs.engineer.outputs.pr_number }}`;
            const prNumber = Number(prNumberRaw);

            const body = [
              "## PM agent summary",
              "",
              pm || "No PM output produced."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            if (Number.isFinite(prNumber) && prNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
