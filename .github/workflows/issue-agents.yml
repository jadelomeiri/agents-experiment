name: Issue Agent Pipeline

on:
  issues:
    types: [opened]

concurrency:
  group: issue-agent-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  engineer:
    name: Engineer Agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      engineer_message: ${{ steps.run_engineer.outputs.final-message }}
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
      pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
    steps:
      - uses: actions/checkout@v5

      - name: Run Engineer agent
        id: run_engineer
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are the Engineer agent.

            Goal:
            - Resolve the GitHub issue by making the smallest correct code/docs change.
            - Keep implementation simple and practical.

            Required behavior:
            1. Create a short plan (1-3 bullets) before editing.
            2. Implement directly in the checked-out repository.
            3. If there is no code yet, scaffold minimal structure needed by the issue.
            4. Keep changes focused and avoid unrelated refactors.
            5. Run basic sanity checks where possible.
            6. Produce a concise summary of what was changed and any follow-ups.

            Output format:
            - Plan
            - Changes made
            - Validation performed
            - Risks / follow-ups

            Issue context:
            Issue #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}
            Body:
            ${{ github.event.issue.body }}
          output-file: engineer-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Create pull request from engineer changes
        id: create_pr
        if: steps.run_engineer.conclusion == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: address issue #${{ github.event.issue.number }}"
          branch: "codex/issue-${{ github.event.issue.number }}"
          title: "Resolve issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          body: |
            Automated implementation by Engineer agent for #${{ github.event.issue.number }}.

            ### Engineer output
            ${{ steps.run_engineer.outputs.final-message }}
          labels: automated,codex
          add-paths: |
            **

      - name: Comment engineer result on issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prUrl = `${{ steps.create_pr.outputs.pull-request-url }}`;
            const finalMessage = `${{ steps.run_engineer.outputs.final-message }}`;
            const body = [
              "## Engineer agent complete",
              prUrl ? `PR created: ${prUrl}` : "No PR created (no file changes detected).",
              "",
              "### Engineer summary",
              finalMessage || "No summary produced."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  qa:
    name: QA Agent
    runs-on: ubuntu-latest
    needs: engineer
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      qa_message: ${{ steps.run_qa.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5

      - name: Run QA agent
        id: run_qa
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are the QA agent.

            Goal:
            - Evaluate the engineer changes as an expert QA architect/tester.
            - Keep output practical and lightweight.

            Required behavior:
            1. Review changed files and identify risk areas.
            2. Propose a compact test strategy (happy path, edge cases, regression).
            3. Run available tests/checks if present; if none exist, state that explicitly.
            4. Report findings as PASS / NEEDS_ATTENTION with clear reasons.
            5. Provide a short actionable checklist for next QA improvements.

            Output format:
            - QA verdict: PASS or NEEDS_ATTENTION
            - What was reviewed
            - Tests run / simulated
            - Defects or risks
            - Recommended next steps

            Issue context:
            Issue #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}
            Body:
            ${{ github.event.issue.body }}

            Pull request number: ${{ needs.engineer.outputs.pr_number }}
            Pull request URL: ${{ needs.engineer.outputs.pr_url }}
          output-file: qa-output.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Post QA review
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const qa = `${{ steps.run_qa.outputs.final-message }}`;
            const prNumberRaw = `${{ needs.engineer.outputs.pr_number }}`;
            const prNumber = Number(prNumberRaw);

            const issueBody = [
              "## QA agent complete",
              "",
              qa || "No QA output produced."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: issueBody,
            });

            if (Number.isFinite(prNumber) && prNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: issueBody,
              });
            }

  pm:
    name: PM Agent
    runs-on: ubuntu-latest
    needs: [engineer, qa]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Run PM agent
        id: run_pm
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are the PM agent.

            Goal:
            - Provide a clear delivery summary for issue stakeholders.

            Required behavior:
            1. Summarize what was delivered in plain language.
            2. Confirm whether acceptance criteria appear met.
            3. List open risks, assumptions, and follow-up items.
            4. Recommend the next action: ship / iterate / request clarification.

            Output format:
            - Delivery summary
            - Acceptance status
            - Risks and assumptions
            - Recommended next action

            Issue context:
            Issue #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}
            Body:
            ${{ github.event.issue.body }}

            Pull request number: ${{ needs.engineer.outputs.pr_number }}
            Pull request URL: ${{ needs.engineer.outputs.pr_url }}

            Engineer summary:
            ${{ needs.engineer.outputs.engineer_message }}

            QA summary:
            ${{ needs.qa.outputs.qa_message }}
          output-file: pm-output.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Post PM summary to issue and PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pm = `${{ steps.run_pm.outputs.final-message }}`;
            const prNumberRaw = `${{ needs.engineer.outputs.pr_number }}`;
            const prNumber = Number(prNumberRaw);

            const body = [
              "## PM agent summary",
              "",
              pm || "No PM output produced."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            if (Number.isFinite(prNumber) && prNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
